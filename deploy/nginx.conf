# MiniMe — Nginx reverse proxy configuration
# Place in: /etc/nginx/sites-available/minime
# Enable: ln -s /etc/nginx/sites-available/minime /etc/nginx/sites-enabled/
# After getting SSL cert: certbot --nginx -d yourdomain.com

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — managed by Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (supplement to Next.js headers)
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Increase timeouts for long-running AI requests
    proxy_read_timeout  120s;
    proxy_send_timeout  120s;
    proxy_connect_timeout 10s;

    # Increase body size for file uploads
    client_max_body_size 20M;

    # Main reverse proxy → Next.js on port 3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Webhook endpoints — no caching, higher rate limiting at nginx level
    location ~ ^/api/(telegram|webhook)/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass 1;

        # Nginx-level rate limit: 30 req/s per IP for webhooks
        limit_req zone=webhook burst=50 nodelay;
    }

    # Static Next.js files — cache aggressively
    location /_next/static/ {
        proxy_pass   http://127.0.0.1:3000;
        expires      1y;
        add_header   Cache-Control "public, immutable";
    }
}

# Rate limit zones (add to /etc/nginx/nginx.conf http block)
# limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/s;
# limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
